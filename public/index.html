<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Daily English Coach V4</title><style>
body{margin:0;background:#f4f6fb;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:#111827}header{background:linear-gradient(135deg,#2563eb,#4f46e5);color:white;padding:26px 18px;text-align:center}main{max-width:1120px;margin:0 auto;padding:18px}.tabs{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:18px}button{border:0;border-radius:13px;padding:11px 14px;font-weight:900;cursor:pointer}.tab{background:white;border:1px solid #e5e7eb}.tab.active{background:#2563eb;color:white}.panel{display:none}.panel.active{display:block}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(285px,1fr));gap:16px}.card{background:white;border:1px solid #e5e7eb;border-radius:20px;padding:18px;box-shadow:0 10px 25px rgba(0,0,0,.06)}.flash{height:540px;perspective:1000px}.inner{position:relative;width:100%;height:100%;transition:.55s;transform-style:preserve-3d;cursor:pointer}.flash.flipped .inner{transform:rotateY(180deg)}.face{position:absolute;inset:0;background:white;border:1px solid #e5e7eb;border-radius:22px;padding:22px;backface-visibility:hidden;overflow:auto;box-shadow:0 10px 25px rgba(0,0,0,.08)}.front{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}.back{transform:rotateY(180deg)}.word{font-size:32px;font-weight:1000;margin:12px 0;text-align:center}.meaning-front{font-size:18px;font-weight:800;line-height:1.5}.pill{display:inline-block;background:#eef2ff;color:#3730a3;border-radius:999px;padding:5px 10px;font-weight:900;font-size:12px;margin:2px}.box{background:#f9fafb;border:1px solid #e5e7eb;border-radius:13px;padding:10px;margin-top:6px;line-height:1.55;white-space:pre-line}.label{font-weight:1000;margin-top:12px}.status{background:#eff6ff;border:1px solid #bfdbfe;border-radius:14px;padding:12px;margin-bottom:16px;font-weight:800;color:#1e40af}.muted,.small{color:#6b7280}.secondary{background:#e5e7eb}.success{background:#16a34a;color:white}.danger{background:#fee2e2;color:#991b1b}.primary{background:#2563eb;color:white}.top{display:flex;justify-content:space-between;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:16px}.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:16px}.stats b{font-size:24px}.record{display:flex;justify-content:space-between;gap:10px;border-bottom:1px solid #e5e7eb;padding:12px 0}.quiz-option{display:block;width:100%;text-align:left;margin-top:8px;background:#f3f4f6;border:1px solid #e5e7eb;color:#111827}.correct{background:#dcfce7!important}.wrong{background:#fee2e2!important}select{padding:10px;border:1px solid #e5e7eb;border-radius:12px;background:white;font-weight:700}@media(max-width:700px){.tabs{grid-template-columns:1fr 1fr}.flash{height:570px}.word{font-size:28px}}
</style></head><body><header><h1>Daily English Coach V4</h1><p>Season 1 · 30일 / 90개 · 실전 비즈니스 영어</p></header><main>
<div class="tabs"><button class="tab active" onclick="showTab('today',this)">오늘</button><button class="tab" onclick="showTab('records',this)">기록</button><button class="tab" onclick="showTab('review',this)">복습</button><button class="tab" onclick="showTab('stats',this)">통계</button></div>
<section id="today" class="panel active"><div class="status" id="status">DB 로딩 중...</div><div class="stats"><div class="card"><span class="muted">Season 1</span><br><b id="dbCount">-</b></div><div class="card"><span class="muted">오늘</span><br><b id="dayNow">-</b></div><div class="card"><span class="muted">연속 학습</span><br><b id="streak">0일</b></div></div><div class="top"><div><h2 style="margin:0">오늘의 단어 3개</h2><div class="muted" id="dateText"></div></div><select id="daySelect" onchange="manualDay()"></select></div><div class="grid" id="cards"></div><div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:16px"><button class="success" onclick="completeToday()">다 외웠어요 ✅</button><button class="secondary" onclick="speakAll()">발음 듣기 🔊</button></div></section>
<section id="records" class="panel"><div class="top"><h2>학습 기록</h2><button class="danger" onclick="clearRecords()">전체 삭제</button></div><div class="card" id="recordsBox"></div></section><section id="review" class="panel"><div class="top"><h2>복습 퀴즈</h2><button class="primary" onclick="buildQuiz()">퀴즈 새로 만들기</button></div><div class="card" id="reviewSummary"></div><div id="quizBox" style="margin-top:14px"></div></section><section id="stats" class="panel"><h2>통계</h2><div class="grid" id="statsBox"></div></section></main>
<script>
let WORDS=[];const START="s1StartV4";function tk(){return new Date().toISOString().slice(0,10)}function fmt(k){return new Date(k+"T00:00:00").toLocaleDateString("ko-KR",{year:"numeric",month:"long",day:"numeric",weekday:"long"})}function load(k,d){try{return JSON.parse(localStorage.getItem(k))||d}catch(e){return d}}function save(k,v){localStorage.setItem(k,JSON.stringify(v))}function rec(){return load("recordsV4",{})}function getStart(){let s=localStorage.getItem(START);if(!s){s=tk();localStorage.setItem(START,s)}return s}function curDay(){let a=new Date(getStart()+"T00:00:00"),b=new Date(tk()+"T00:00:00");return Math.min(Math.max(Math.floor((b-a)/86400000)+1,1),30)}function selDay(){return Number(localStorage.getItem("selDayV4")||curDay())}function todayWords(){return WORDS.filter(w=>w.day===selDay())}function daysAgo(n){let d=new Date();d.setDate(d.getDate()-n);return d.toISOString().slice(0,10)}function streak(){let r=rec(),s=0;for(let i=0;i<365;i++){if(r[daysAgo(i)]?.completed)s++;else break}return s}function cat(c){return c==="business"?"비즈니스":c==="sales"?"해외영업":"일상"}function lvl(l){return l==="advanced"?"고급":"중급"}function safe(s){return String(s).replace(/'/g,"\\'")}function esc(s){return String(s).replace(/[.*+?^${}()|[\]\\]/g,"\\$&")}
function render(){let ws=todayWords();document.getElementById("cards").innerHTML=ws.map(w=>`<div class="flash" onclick="this.classList.toggle('flipped')"><div class="inner"><div class="face front"><span class="pill">${cat(w.category)}</span><span class="pill">${lvl(w.level)}</span><div class="word">${w.word}</div><div class="meaning-front">${w.meanings.map((m,i)=>`${i+1}. ${m}`).join("<br>")}</div><button class="secondary" onclick="event.stopPropagation();speak('${safe(w.word)}')">발음 듣기 🔊</button><div class="muted" style="margin-top:20px">탭하면 예문 보기</div></div><div class="face back"><span class="pill">${cat(w.category)}</span><span class="pill">${lvl(w.level)}</span><h2>${w.word}</h2><div class="label">주요 뜻</div><div>${w.meanings.map((m,i)=>`${i+1}. ${m}`).join("<br>")}</div><div class="label">예문</div><div class="box">${w.example}<br><span class="small">${w.translation}</span></div><div class="label">실전 이메일</div><div class="box">${w.emailExample}<br><span class="small">${w.emailTranslation}</span></div><div class="label">관련 표현</div><div class="box">${w.related.map(x=>"• "+x).join("<br>")}</div><div class="label">💡 시각 연상</div><div class="box">${w.visual}</div></div></div></div>`).join("");updateStats()}
function completeToday(){let r=rec();r[tk()]={completed:true,day:selDay(),at:new Date().toISOString(),words:todayWords()};save("recordsV4",r);renderRecords();updateStats();document.getElementById("status").textContent="오늘 학습 완료로 저장했습니다."}function renderRecords(){let r=rec(),ks=Object.keys(r).sort().reverse();document.getElementById("recordsBox").innerHTML=ks.length?ks.map(k=>`<div class="record"><div><b>${fmt(k)} · Day ${r[k].day}</b><div class="small">${r[k].words.map(w=>w.word).join(", ")}</div></div><div>✅ 완료</div></div>`).join(""):"아직 학습 기록이 없습니다."}
function due(){let r=rec(),out=[];[1,3,7,30].forEach(n=>{let it=r[daysAgo(n)];if(it)(it.words||[]).forEach(w=>{if(!out.some(x=>x.id===w.id))out.push(w)})});return out.length?out:todayWords()}function buildQuiz(){let qs=due().sort(()=>Math.random()-.5).slice(0,5);document.getElementById("reviewSummary").innerHTML=`복습 대상: <b>${qs.length}</b>개`;document.getElementById("quizBox").innerHTML=qs.map((w,i)=>{let opts=[w.word];while(opts.length<3){let x=WORDS[Math.floor(Math.random()*WORDS.length)].word;if(!opts.includes(x))opts.push(x)}opts.sort(()=>Math.random()-.5);let blank=w.example.replace(new RegExp(esc(w.word),"i"),"_____");return `<div class="card" style="margin-bottom:12px"><b>문제 ${i+1}</b><p>${blank}</p>${opts.map(o=>`<button class="quiz-option" onclick="check(this,'${safe(o)}','${safe(w.word)}')">${o}</button>`).join("")}<p class="small">힌트: ${w.meanings.join(" / ")}</p></div>`}).join("")}
function check(btn,sel,ans){let all=btn.parentElement.querySelectorAll(".quiz-option");all.forEach(b=>b.disabled=true);if(sel===ans){btn.classList.add("correct");btn.textContent+=" ✅"}else{btn.classList.add("wrong");btn.textContent+=" ❌";all.forEach(b=>{if(b.textContent.trim()===ans){b.classList.add("correct");b.textContent+=" ✅ 정답"}})}}function updateStats(){document.getElementById("dbCount").textContent=WORDS.length+"개";document.getElementById("dayNow").textContent="Day "+selDay();document.getElementById("streak").textContent=streak()+"일";let r=rec(),learned=new Set();Object.values(r).forEach(v=>(v.words||[]).forEach(w=>learned.add(w.id)));let counts={business:0,sales:0,daily:0};WORDS.filter(w=>learned.has(w.id)).forEach(w=>counts[w.category]++);document.getElementById("statsBox").innerHTML=`<div class="card"><span class="muted">총 학습</span><br><b>${learned.size}개</b></div><div class="card"><span class="muted">비즈니스</span><br><b>${counts.business}개</b></div><div class="card"><span class="muted">해외영업</span><br><b>${counts.sales}개</b></div><div class="card"><span class="muted">일상</span><br><b>${counts.daily}개</b></div>`}
function showTab(id,btn){document.querySelectorAll(".panel").forEach(p=>p.classList.remove("active"));document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));document.getElementById(id).classList.add("active");btn.classList.add("active");if(id==="records")renderRecords();if(id==="review")buildQuiz();if(id==="stats")updateStats()}function manualDay(){localStorage.setItem("selDayV4",document.getElementById("daySelect").value);render()}function setup(){let s=document.getElementById("daySelect");s.innerHTML=Array.from({length:30},(_,i)=>`<option value="${i+1}">Day ${i+1}</option>`).join("");s.value=selDay()}function clearRecords(){if(confirm("전체 학습 기록을 삭제할까요?")){localStorage.removeItem("recordsV4");renderRecords();updateStats()}}function speak(t){if(!("speechSynthesis" in window))return;let u=new SpeechSynthesisUtterance(t);u.lang="en-US";u.rate=.85;speechSynthesis.speak(u)}function speakAll(){todayWords().forEach((w,i)=>setTimeout(()=>speak(w.word+". "+w.example),i*2500))}
document.getElementById("dateText").textContent=fmt(tk());fetch("season1.json").then(r=>r.json()).then(d=>{WORDS=d;setup();document.getElementById("status").textContent="Season 1 DB 로딩 완료";render();renderRecords();buildQuiz()})
</script></body></html>
