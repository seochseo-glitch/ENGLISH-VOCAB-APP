<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Daily English Coach</title>
<style>
body{margin:0;background:#f4f6fb;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:#111827}
header{background:linear-gradient(135deg,#2563eb,#4f46e5);color:white;padding:26px 18px;text-align:center}
main{max-width:1050px;margin:0 auto;padding:18px}.tabs{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:18px}
button{border:0;border-radius:13px;padding:11px 14px;font-weight:900;cursor:pointer}.tab{background:white;border:1px solid #e5e7eb}.tab.active{background:#2563eb;color:white}
.panel{display:none}.panel.active{display:block}.top{display:flex;justify-content:space-between;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:16px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(270px,1fr));gap:16px}.card{background:white;border:1px solid #e5e7eb;border-radius:20px;padding:18px;box-shadow:0 10px 25px rgba(0,0,0,.06)}
.flash{height:360px;perspective:1000px}.inner{position:relative;width:100%;height:100%;transition:.55s;transform-style:preserve-3d;cursor:pointer}.flash.flipped .inner{transform:rotateY(180deg)}
.face{position:absolute;inset:0;background:white;border:1px solid #e5e7eb;border-radius:22px;padding:22px;backface-visibility:hidden;overflow:auto;box-shadow:0 10px 25px rgba(0,0,0,.08)}
.front{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}.back{transform:rotateY(180deg)}
.word{font-size:34px;font-weight:1000;margin:12px 0}.ipa,.muted,.small{color:#6b7280}.small{font-size:13px}.pill{display:inline-block;background:#eef2ff;color:#3730a3;border-radius:999px;padding:5px 10px;font-weight:900;font-size:12px}
.primary{background:#2563eb;color:white}.success{background:#16a34a;color:white}.secondary{background:#e5e7eb;color:#111827}.danger{background:#fee2e2;color:#991b1b}
.box{background:#f9fafb;border:1px solid #e5e7eb;border-radius:13px;padding:10px;margin-top:6px;line-height:1.55}.label{font-weight:1000;margin-top:12px}.status{background:#eff6ff;border:1px solid #bfdbfe;border-radius:14px;padding:12px;margin-bottom:16px;font-weight:800;color:#1e40af}
.record{display:flex;justify-content:space-between;gap:10px;border-bottom:1px solid #e5e7eb;padding:12px 0}.record:last-child{border-bottom:0}
.quiz-option{display:block;width:100%;text-align:left;margin-top:8px;background:#f3f4f6;border:1px solid #e5e7eb;color:#111827}.correct{background:#dcfce7!important}.wrong{background:#fee2e2!important}
@media(max-width:700px){.tabs{grid-template-columns:1fr}.flash{height:390px}.word{font-size:29px}}
</style></head>
<body><header><h1>Daily English Coach</h1><p>매일 3개 · 구동사 포함 · 플래시카드 · 주간 복습</p></header>
<main>
<div class="tabs"><button class="tab active" onclick="showTab('today',this)">오늘의 단어</button><button class="tab" onclick="showTab('records',this)">학습 기록</button><button class="tab" onclick="showTab('review',this)">주간 복습</button></div>
<section id="today" class="panel active"><div class="status" id="status">준비 완료</div><div class="top"><div><h2 style="margin:0">오늘의 단어 3개</h2><div class="muted" id="dateText"></div></div><select id="category" onchange="changeCategory()"><option value="mixed">혼합</option><option value="business">해외영업/비즈니스</option><option value="daily">일상 회화</option><option value="trade">견적·납기·선적</option></select></div><div class="grid" id="cards"></div><div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:16px"><button class="success" onclick="completeToday()">다 외웠어요 ✅</button><button class="primary" onclick="regenerateWords()">AI로 다시 생성</button><button class="secondary" onclick="speakAll()">발음 듣기 🔊</button></div><div class="card" style="margin-top:16px"><h3 style="margin-top:0">실전 사용법</h3><div id="usage"></div></div></section>
<section id="records" class="panel"><div class="top"><h2 style="margin:0">학습 기록</h2><button class="danger" onclick="clearRecords()">전체 삭제</button></div><div class="card" id="recordsBox"></div></section>
<section id="review" class="panel"><div class="top"><h2 style="margin:0">주간 복습</h2><button class="primary" onclick="buildQuiz()">퀴즈 새로 만들기</button></div><div class="card" id="summary"></div><div id="quizBox" style="margin-top:14px"></div></section>
</main>
<script>
const WORDS=[
["follow up on","/ˈfɑːloʊ ʌp ɑːn/","구동사",["business","trade"],"진행 상황을 확인하다","I will follow up on the quotation tomorrow.","내일 견적 건을 다시 확인하겠습니다.","특정 사안을 끝까지 따라가며 확인하는 느낌.","follow up on + 사안 / follow up with + 사람"],
["proceed with","/proʊˈsiːd wɪð/","구동사",["business","trade"],"~을 진행하다","We can proceed with production after approval.","승인 후 생산을 진행할 수 있습니다.","앞으로 나아가다.","proceed with order, production, shipment"],
["look into","/lʊk ˈɪntuː/","구동사",["business","daily"],"검토하다, 조사하다","We will look into the issue and get back to you.","해당 문제를 검토 후 회신드리겠습니다.","문제 안쪽을 들여다보는 느낌.","look into the issue / delay / complaint"],
["get back to","/ɡet bæk tuː/","구동사",["business","daily"],"다시 연락하다, 회신하다","I will get back to you by tomorrow.","내일까지 회신드리겠습니다.","상대에게 다시 돌아가는 느낌.","reply보다 부드럽고 자연스러움"],
["carry out","/ˈkæri aʊt/","구동사",["business","trade"],"수행하다","We carried out the inspection before shipment.","선적 전 검사를 수행했습니다.","계획을 끝까지 가져가 실행.","carry out inspection/test/work"],
["run out of","/rʌn aʊt əv/","구동사",["daily","business"],"~이 다 떨어지다","We are running out of time.","시간이 부족해지고 있습니다.","밖으로 다 빠져나가 없어짐.","run out of stock/time/options"],
["figure out","/ˈfɪɡjər aʊt/","구동사",["daily","business"],"알아내다, 해결하다","We need to figure out the root cause.","근본 원인을 알아내야 합니다.","그림을 맞추듯 해결.","find out보다 해결 뉘앙스가 강함"],
["confirm","/kənˈfɜːrm/","동사",["business","trade"],"확인하다, 확정하다","Could you confirm the delivery schedule?","납기 일정을 확인해 주시겠습니까?","컨펌하다.","confirm schedule/quantity/payment"],
["lead time","/ˈliːd taɪm/","명사",["business","trade"],"제작/납기 소요 기간","The lead time is around 40 to 50 days after approval.","승인 후 리드타임은 약 40~50일입니다.","납기 문의 핵심 표현.","lead time after drawing approval"],
["quotation","/kwoʊˈteɪʃən/","명사",["business","trade"],"견적서, 견적","Please find the attached quotation.","첨부된 견적서를 확인 부탁드립니다.","quote보다 공식적.","quotation for item No. 3"],
["shipment","/ˈʃɪpmənt/","명사",["trade"],"선적, 발송","The shipment is scheduled for next week.","선적은 다음 주 예정입니다.","ship의 명사형.","shipment schedule / partial shipment"],
["payment terms","/ˈpeɪmənt tɜːrmz/","명사",["business","trade"],"결제 조건","Could you accept T/T 30 days after B/L date?","B/L 날짜 후 30일 T/T 조건을 수락 가능하십니까?","해외영업 핵심 표현.","payment terms are T/T in advance"],
["available","/əˈveɪləbl/","형용사",["business","daily"],"이용 가능한, 준비된","The material is available in stock.","해당 자재는 재고가 있습니다.","사용 가능한 상태.","available in stock / available tomorrow"],
["delay","/dɪˈleɪ/","동사/명사",["business","trade"],"지연되다, 지연","The shipment has been delayed due to bad weather.","악천후로 선적이 지연되었습니다.","딜레이.","delay in production/shipment"],
["arrange","/əˈreɪndʒ/","동사",["business","trade"],"준비하다, 조율하다","We will arrange the inspection schedule.","검사 일정을 조율하겠습니다.","일정/검사/운송 준비.","arrange shipment / arrange meeting"],
["be subject to","/bi ˈsʌbdʒɪkt tuː/","표현",["business","trade"],"~에 따라 달라지다","The delivery schedule is subject to material availability.","납기는 자재 가능 여부에 따라 달라집니다.","조건에 묶여 있는 느낌.","subject to approval / subject to change"],
["inventory","/ˈɪnvəntɔːri/","명사",["business","trade"],"재고","We need to check our inventory first.","먼저 재고를 확인해야 합니다.","stock과 유사.","inventory check / inventory level"],
["negotiate","/nɪˈɡoʊʃieɪt/","동사",["business"],"협상하다","We are negotiating the payment terms.","결제 조건을 협상하고 있습니다.","negotiation의 동사형.","negotiate price/payment terms"],
["catch up with","/kætʃ ʌp wɪð/","구동사",["daily"],"근황을 나누다, 따라잡다","Let's catch up over coffee this weekend.","이번 주말에 커피 마시며 이야기하자.","놓친 것을 따라잡는 느낌.","친한 사람에게 자연스러운 표현"],
["in advance","/ɪn ədˈvæns/","표현",["business","daily"],"미리, 사전에","Please let us know in advance.","사전에 알려주시기 바랍니다.","ahead of time과 유사.","payment in advance / inform in advance"]
].map(a=>({word:a[0],ipa:a[1],type:a[2],cat:a[3],meaning:a[4],example:a[5],ko:a[6],memory:a[7],usage:a[8]}));
function todayKey(){return new Date().toISOString().slice(0,10)}
function fmt(k){return new Date(k+"T00:00:00").toLocaleDateString("ko-KR",{year:"numeric",month:"long",day:"numeric",weekday:"long"})}
function load(k,d){try{return JSON.parse(localStorage.getItem(k))||d}catch(e){return d}}
function save(k,v){localStorage.setItem(k,JSON.stringify(v))}
function cat(){return localStorage.getItem("cat")||"mixed"}
function records(){return load("records",{})}
function setStatus(t){document.getElementById("status").textContent=t}
function pool(){let c=cat();return c==="mixed"?WORDS:WORDS.filter(w=>w.cat.includes(c))}
function pickWords(force=false){const key="words_"+todayKey()+"_"+cat();if(!force&&localStorage.getItem(key))return load(key,[]);let p=pool();if(p.length<3)p=WORDS;let sh=[...p].sort(()=>Math.random()-.5),picked=[];let ph=sh.find(w=>w.type==="구동사");if(ph)picked.push(ph);for(const w of sh){if(picked.length>=3)break;if(!picked.some(x=>x.word===w.word))picked.push(w)}save(key,picked);return picked}
function render(){const words=pickWords();document.getElementById("cards").innerHTML=words.map(w=>`<div class="flash" onclick="this.classList.toggle('flipped')"><div class="inner"><div class="face front"><span class="pill">${w.type}</span><div class="word">${w.word}</div><div class="ipa">${w.ipa}</div><button class="secondary" onclick="event.stopPropagation();speak('${w.word.replace(/'/g,"\'")}')">발음 듣기 🔊</button><div class="muted" style="margin-top:20px">탭하면 뒤집기</div></div><div class="face back"><span class="pill">${w.type}</span><h2>${w.word}</h2><div class="label">뜻</div><div>${w.meaning}</div><div class="label">예문</div><div class="box">${w.example}<br><span class="small">${w.ko}</span></div><div class="label">💡 연상</div><div class="box">${w.memory}</div><div class="label">실전 팁</div><div class="box">${w.usage}</div></div></div></div>`).join("");document.getElementById("usage").innerHTML=`<b>${words[0].word}</b><div class="box">${words[0].usage}</div>`}
function regenerateWords(){localStorage.removeItem("words_"+todayKey()+"_"+cat());pickWords(true);render();setStatus("새 단어 3개로 다시 생성했습니다. 현재는 무료 내장 DB 모드입니다.")}
function completeToday(){const r=records();r[todayKey()]={completed:true,words:pickWords(),at:new Date().toISOString()};save("records",r);renderRecords();setStatus("오늘 학습 완료로 저장했습니다.")}
function renderRecords(){const r=records(),keys=Object.keys(r).sort().reverse();document.getElementById("recordsBox").innerHTML=keys.length?keys.map(k=>`<div class="record"><div><b>${fmt(k)}</b><div class="small">${r[k].words.map(w=>w.word).join(", ")}</div></div><div>✅ 완료</div></div>`).join(""):"아직 학습 기록이 없습니다."}
function weekWords(){const r=records();let out=[];let now=new Date(),start=new Date(now);start.setDate(now.getDate()-((now.getDay()+6)%7));start.setHours(0,0,0,0);Object.keys(r).forEach(k=>{let d=new Date(k+"T00:00:00");if(d>=start)(r[k].words||[]).forEach(w=>{if(!out.some(x=>x.word===w.word))out.push(w)})});return out.length?out:pickWords()}
function buildQuiz(){const words=[...weekWords()].sort(()=>Math.random()-.5).slice(0,5);document.getElementById("summary").innerHTML=`이번 주 복습 대상: <b>${words.length}</b>개`;document.getElementById("quizBox").innerHTML=words.map((w,i)=>{let opts=[w.word];for(const x of [...WORDS].sort(()=>Math.random()-.5)){if(opts.length>=3)break;if(!opts.includes(x.word))opts.push(x.word)}opts.sort(()=>Math.random()-.5);let blank=w.example.replace(new RegExp(w.word.replace(/[.*+?^${}()|[\]\\]/g,"\\$&"),"i"),"_____");return `<div class="card" style="margin-bottom:12px"><b>문제 ${i+1}</b><p>${blank}</p>${opts.map(o=>`<button class="quiz-option" onclick="check(this,'${o.replace(/'/g,"\'")}','${w.word.replace(/'/g,"\'")}')">${o}</button>`).join("")}<p class="small">힌트: ${w.meaning}</p></div>`}).join("")}
function check(btn,sel,ans){const all=btn.parentElement.querySelectorAll(".quiz-option");all.forEach(b=>b.disabled=true);if(sel===ans){btn.classList.add("correct");btn.textContent+=" ✅"}else{btn.classList.add("wrong");btn.textContent+=" ❌";all.forEach(b=>{if(b.textContent.trim()===ans){b.classList.add("correct");b.textContent+=" ✅ 정답"}})}}
function showTab(id,btn){document.querySelectorAll(".panel").forEach(p=>p.classList.remove("active"));document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));document.getElementById(id).classList.add("active");btn.classList.add("active");if(id==="records")renderRecords();if(id==="review")buildQuiz()}
function changeCategory(){localStorage.setItem("cat",document.getElementById("category").value);render();setStatus("카테고리를 변경했습니다.")}
function clearRecords(){if(confirm("전체 기록을 삭제할까요?")){localStorage.removeItem("records");renderRecords()}}
function speak(t){if(!("speechSynthesis" in window))return;let u=new SpeechSynthesisUtterance(t);u.lang="en-US";u.rate=.85;speechSynthesis.speak(u)}
function speakAll(){pickWords().forEach((w,i)=>setTimeout(()=>speak(w.word+". "+w.example),i*2500))}
document.getElementById("dateText").textContent=fmt(todayKey());document.getElementById("category").value=cat();render();renderRecords();buildQuiz();
</script></body></html>
